### -------------------------------------------------------------------
### Localisation
### -------------------------------------------------------------------
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i netcfg/choose_interface select auto

### -------------------------------------------------------------------
### Network (robust DHCP)
### -------------------------------------------------------------------
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean false
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string local
d-i netcfg/wait_timeout string 60

### -------------------------------------------------------------------
### Mirror settings
### -------------------------------------------------------------------
# ОНЛАЙН установка (по умолчанию)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### -------------------------------------------------------------------
### Clock
### -------------------------------------------------------------------
d-i clock-setup/utc boolean true
d-i time/zone string UTC

### -------------------------------------------------------------------
### Partitioning (LVM)
### -------------------------------------------------------------------
d-i partman-auto/method string lvm

# В unattended лучше TRUE (иначе падает на "грязных" дисках)
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

### -------------------------------------------------------------------
### Expert recipe
### -------------------------------------------------------------------
d-i partman-auto/expert_recipe string \
  boot-lvm :: \
    1024 1024 1024 ext2 \
      $primary{ } $bootable{ } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ ext2 } \
      mountpoint{ /boot } \
    . \
    20480 40960 -1 ext4 \
      $lvmok{ } \
      lv_name{ root } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ ext4 } \
      mountpoint{ / } \
    . \
    1024 2048 2048 linux-swap \
      $lvmok{ } \
      lv_name{ swap } \
      method{ swap } format{ } \
    .

d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### -------------------------------------------------------------------
### Base system
### -------------------------------------------------------------------
d-i base-installer/install-recommends boolean true

### -------------------------------------------------------------------
### Users
### -------------------------------------------------------------------
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Admin User
d-i passwd/username string user
d-i passwd/user-password password 12345678
d-i passwd/user-password-again password 12345678
d-i user-setup/allow-password-weak boolean true
d-i passwd/user-default-groups string sudo

### -------------------------------------------------------------------
### Package selection
### -------------------------------------------------------------------

# ============================================================
# ВАРИАНТ 1 — ТОЛЬКО КОНСОЛЬ
# ============================================================
# tasksel tasksel/first multiselect standard

# ============================================================
# ВАРИАНТ 2 — GNOME
# ============================================================
tasksel tasksel/first multiselect standard, gnome-desktop

# ============================================================
# ВАРИАНТ 3 — XFCE
# ============================================================
# tasksel tasksel/first multiselect standard, xfce-desktop

# ============================================================
# ВАРИАНТ 4 — KDE
# ============================================================
# tasksel tasksel/first multiselect standard, kde-desktop

# ============================================================
# ВАРИАНТ 5 — минимальная графика (через пакеты)
# ============================================================
# d-i pkgsel/include string task-xfce-desktop lightdm

# --- дополнительные пакеты ---
d-i pkgsel/include string openssh-server curl wget vim
d-i pkgsel/upgrade select safe-upgrade

### -------------------------------------------------------------------
### GRUB
### -------------------------------------------------------------------
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### -------------------------------------------------------------------
### Late command
### -------------------------------------------------------------------
d-i preseed/late_command string \
  in-target sh -c 'set -eux; \
    systemctl enable ssh.service || true; \
    systemctl enable sshd.service || true; \
    echo "user ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/user; \
    chmod 0440 /etc/sudoers.d/user; \
    sync || true; \
    exit 0'

### -------------------------------------------------------------------
### Finish (fully unattended)
### -------------------------------------------------------------------
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/poweroff boolean true
